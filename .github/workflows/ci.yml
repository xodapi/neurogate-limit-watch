name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Show Rust toolchain
        run: |
          rustc --version
          cargo --version
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Format check
        run: cargo fmt --check
      - name: Test
        run: cargo test --locked
      - name: Test GUI feature
        run: cargo check --features gui --locked
      - name: Run demo CLI
        run: cargo run --locked -- --demo --json
      - name: Run fixture CLI
        run: cargo run --locked -- --mock tests/fixtures/me.json
