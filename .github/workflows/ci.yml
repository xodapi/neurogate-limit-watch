name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Show Rust toolchain
        run: |
          rustc --version
          cargo --version
      - name: Test
        run: cargo test --locked
      - name: Run demo CLI
        run: cargo run --locked -- --demo --json
      - name: Run fixture CLI
        run: cargo run --locked -- --mock tests/fixtures/me.json
