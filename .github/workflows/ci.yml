name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            features: ""
          - os: windows-latest
            features: "--features gui"
          - os: macos-latest
            features: "--features gui"

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxkbcommon-dev
      - name: Show Rust toolchain
        run: |
          rustc --version
          cargo --version
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets ${{ matrix.features }} -- -D warnings
      - name: Test
        run: cargo test --locked ${{ matrix.features }}
      - name: Run demo CLI
        run: cargo run --locked -- --demo --json
      - name: Run fixture CLI
        run: cargo run --locked -- --mock tests/fixtures/me.json
